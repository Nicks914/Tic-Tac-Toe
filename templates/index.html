<!DOCTYPE html>
<html>

<head>
<title>Tic Tac Toe</title>

<style>

body{
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
color:white;
}

.container{
width:420px;
backdrop-filter:blur(18px);
background:rgba(255,255,255,0.1);
border-radius:20px;
padding:30px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
text-align:center;
}

h1{
margin-top:0;
}

.message{
margin:15px;
font-size:22px;
}

.board{
display:grid;
grid-template-columns:repeat(3,120px);
gap:10px;
margin:auto;
}

.cell{
width:120px;
height:120px;
border-radius:15px;
background:rgba(255,255,255,0.2);
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
cursor:pointer;
transition:0.25s;
position:relative;
}

.cell:hover{
background:rgba(255,255,255,0.35);
transform:scale(1.07);
box-shadow:0 0 15px rgba(255,255,255,0.5);
}

.move{
width:100%;
height:100%;
display:flex;
justify-content:center;
align-items:center;
text-decoration:none;
}

.x{
color:#00d4ff;
animation:pop 0.3s ease;
font-weight:bold;
}

.o{
color:#ff5b5b;
animation:pop 0.3s ease;
font-weight:bold;
}

.winner{
background:#2ecc71 !important;
color:white !important;
animation:winGlow 1s infinite alternate;
}

@keyframes pop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

@keyframes winGlow{
from{box-shadow:0 0 10px #2ecc71}
to{box-shadow:0 0 25px #2ecc71}
}

.controls button{
margin:8px;
padding:10px 16px;
border:none;
border-radius:8px;
background:#ffffff20;
color:white;
font-size:14px;
cursor:pointer;
transition:0.2s;
}

.controls button:hover{
background:#ffffff40;
}

.thinking{
margin-top:10px;
font-size:18px;
animation:blink 1s infinite;
}

@keyframes blink{
0%{opacity:0.3}
50%{opacity:1}
100%{opacity:0.3}
}

</style>

</head>

<body>

<div class="container">

<h1>🎮 Tic Tac Toe</h1>

<div class="message">
{{.Message}}
</div>

{{if .AITurn}}
<div class="thinking">🤖 AI Thinking...</div>
{{end}}

<div class="controls">
<button onclick="location.href='/mode?mode=ai'">Human vs AI</button>
<button onclick="location.href='/mode?mode=human'">Human vs Human</button>
<button onclick="location.href='/reset'">Reset</button>
</div>

<br>

<div class="board">

{{range $i,$v := .Board}}

<div class="cell
{{if and $.WinnerCells (ge (len $.WinnerCells) 3)}}
{{if eq $i (index $.WinnerCells 0)}}winner{{end}}
{{if eq $i (index $.WinnerCells 1)}}winner{{end}}
{{if eq $i (index $.WinnerCells 2)}}winner{{end}}
{{end}}
">

{{if eq $v.String " "}}

<a href="/move?cell={{$i}}" class="move"></a>

{{else if eq $v.String "X"}}

<span class="x">X</span>

{{else}}

<span class="o">O</span>

{{end}}

</div>

{{end}}

</div>

</div>

</body>
</html>
