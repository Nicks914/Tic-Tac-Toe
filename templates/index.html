<!DOCTYPE html>
<html>

<head>
<title>Tic Tac Toe</title>

<style>

body{
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
margin:0;
color:white;
}

.container{
width:420px;
backdrop-filter:blur(18px);
background:rgba(255,255,255,0.1);
border-radius:20px;
padding:30px;
box-shadow:0 10px 40px rgba(0,0,0,0.3);
text-align:center;
}

h1{
margin-top:0;
}

.message{
margin:15px;
font-size:22px;
}

.board{
display:grid;
grid-template-columns:repeat(3,120px);
gap:10px;
margin:auto;
position:relative;
}

.cell{
width:120px;
height:120px;
border-radius:15px;
background:rgba(255,255,255,0.2);
display:flex;
justify-content:center;
align-items:center;
font-size:60px;
cursor:pointer;
transition:0.25s;
}

.cell:hover{
background:rgba(255,255,255,0.35);
transform:scale(1.07);
box-shadow:0 0 15px rgba(255,255,255,0.5);
}

.move{
width:100%;
height:100%;
}

.x{
color:#00d4ff;
animation:pop 0.3s ease;
font-weight:bold;
}

.o{
color:#ff5b5b;
animation:pop 0.3s ease;
font-weight:bold;
}

.winner{
background:#2ecc71 !important;
color:white !important;
animation:winGlow 1s infinite alternate;
}

.active{
background:#2ecc71 !important;
color:white;
box-shadow:0 0 10px #2ecc71;
}

.controls button{
margin:8px;
padding:10px 16px;
border:none;
border-radius:8px;
background:#ffffff20;
color:white;
font-size:14px;
cursor:pointer;
transition:0.2s;
}

.controls button:hover{
background:#ffffff40;
}

.thinking{
margin-top:10px;
font-size:18px;
animation:blink 1s infinite;
}

#winLine{
position:absolute;
top:0;
left:0;
width:380px;
height:380px;
pointer-events:none;
}

@keyframes pop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

@keyframes winGlow{
from{box-shadow:0 0 10px #2ecc71}
to{box-shadow:0 0 25px #2ecc71}
}

@keyframes blink{
0%{opacity:0.3}
50%{opacity:1}
100%{opacity:0.3}
}

</style>

</head>

<body>

<div class="container">

<audio id="clickSound" src="/static/click.mp3"></audio>
<audio id="winSound" src="/static/win.mp3"></audio>
<audio id="drawSound" src="/static/draw.mp3"></audio>

<h1>🎮 Tic Tac Toe</h1>

<div class="message">
{{.Message}}
</div>

{{if .AITurn}}
<div class="thinking">🤖 AI Thinking...</div>
{{end}}

<div class="controls">

<button class="{{if eq .Mode "ai"}}active{{end}}" 
onclick="location.href='/mode?mode=ai'">
Human vs AI
</button>

<button class="{{if eq .Mode "human"}}active{{end}}" 
onclick="location.href='/mode?mode=human'">
Human vs Human
</button>

<button style="background:red;" onclick="location.href='/reset'">
Reset
</button>

<button onclick="location.href='/difficulty?level=easy'">Easy</button>
<button onclick="location.href='/difficulty?level=medium'">Medium</button>
<button onclick="location.href='/difficulty?level=hard'">Hard</button>

</div>

<br>

<div class="board">

<canvas id="winLine"></canvas>

{{range $i,$v := .Board}}

<div class="cell
{{if and $.WinnerCells (ge (len $.WinnerCells) 3)}}
{{if eq $i (index $.WinnerCells 0)}}winner{{end}}
{{if eq $i (index $.WinnerCells 1)}}winner{{end}}
{{if eq $i (index $.WinnerCells 2)}}winner{{end}}
{{end}}
">

{{if eq $v.String " "}}

<div class="move" onclick="playMove({{$i}})"></div>

{{else if eq $v.String "X"}}

<span class="x">X</span>

{{else}}

<span class="o">O</span>

{{end}}

</div>

{{end}}

</div>

</div>

<script>

function playMove(cell){

const click = document.getElementById("clickSound")
click.play()

document.querySelectorAll(".move").forEach(e=>{
e.style.pointerEvents="none"
})

fetch("/move?cell="+cell)
.then(() => {

setTimeout(()=>{
location.reload()
},400)

})

}

function drawWinningLine(cells){

const canvas = document.getElementById("winLine")
const ctx = canvas.getContext("2d")

canvas.width = 380
canvas.height = 380

const pos = [

[60,60],[190,60],[320,60],
[60,190],[190,190],[320,190],
[60,320],[190,320],[320,320]

]

const start = pos[cells[0]]
const end = pos[cells[2]]

ctx.beginPath()
ctx.moveTo(start[0],start[1])
ctx.lineTo(end[0],end[1])
ctx.lineWidth = 8
ctx.strokeStyle = "#2ecc71"
ctx.stroke()

}

{{if and .WinnerCells (ge (len .WinnerCells) 3)}}

drawWinningLine([
{{index .WinnerCells 0}},
{{index .WinnerCells 1}},
{{index .WinnerCells 2}}
])

document.getElementById("winSound").play()

{{end}}

{{if eq .Message "Game Draw!"}}

document.getElementById("drawSound").play()

{{end}}

</script>

</body>
</html>
